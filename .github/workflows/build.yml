name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust 格式检查和 Clippy
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --lib --bins --tests -- -D warnings

  # 构建和测试
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --lib --verbose

      - name: Run tests
        run: cargo test --lib --verbose
        timeout-minutes: 20

  # Android 构建 (ARMv7 和 ARMv8)
  build-android:
    name: Build Android (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: armv7-linux-androideabi
            arch: armeabi-v7a
          - target: aarch64-linux-android
            arch: arm64-v8a
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26c
          add-to-path: true

      - name: Install cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Setup cargo config and environment
        run: |
          NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          TOOLCHAIN=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin

          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [target.armv7-linux-androideabi]
          linker = "$TOOLCHAIN/armv7a-linux-androideabi21-clang"
          ar = "$TOOLCHAIN/llvm-ar"

          [target.aarch64-linux-android]
          linker = "$TOOLCHAIN/aarch64-linux-android21-clang"
          ar = "$TOOLCHAIN/llvm-ar"
          EOF

          # Set CC and AR for dependencies that use cc-rs
          echo "CC_armv7_linux_androideabi=$TOOLCHAIN/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "PATH=$TOOLCHAIN:$PATH" >> $GITHUB_ENV

      - name: Build for Android
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: libscribe-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/libscribe.so
          retention-days: 1  # 中间构件，1天后自动删除

  # 构建 Android AAR
  build-android-aar:
    name: Build Android AAR
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download ARMv7 library
        uses: actions/download-artifact@v5
        with:
          name: libscribe-armeabi-v7a
          path: android/src/main/jniLibs/armeabi-v7a/

      - name: Download ARMv8 library
        uses: actions/download-artifact@v5
        with:
          name: libscribe-arm64-v8a
          path: android/src/main/jniLibs/arm64-v8a/

      - name: Build AAR
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload AAR
        uses: actions/upload-artifact@v5
        with:
          name: scribe-release.aar
          path: android/build/outputs/aar/scribe-release.aar

  # iOS 构建
  build-ios:
    name: Build iOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-ios
            name: ios-device
          - target: aarch64-apple-ios-sim
            name: ios-simulator-arm64
          - target: x86_64-apple-ios
            name: ios-simulator-x86_64
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Build for iOS
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: libscribe-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/libscribe.a
          retention-days: 1  # 中间构件，1天后自动删除

  # 创建 iOS XCFramework
  build-ios-xcframework:
    name: Build iOS XCFramework
    needs: build-ios
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download device library
        uses: actions/download-artifact@v5
        with:
          name: libscribe-ios-device
          path: ios-device

      - name: Download simulator arm64 library
        uses: actions/download-artifact@v5
        with:
          name: libscribe-ios-simulator-arm64
          path: ios-simulator-arm64

      - name: Download simulator x86_64 library
        uses: actions/download-artifact@v5
        with:
          name: libscribe-ios-simulator-x86_64
          path: ios-simulator-x86_64

      - name: Create fat simulator library
        run: |
          lipo -create \
            ios-simulator-arm64/libscribe.a \
            ios-simulator-x86_64/libscribe.a \
            -output libscribe-simulator.a

      - name: Create XCFramework
        run: |
          xcodebuild -create-xcframework \
            -library ios-device/libscribe.a \
            -headers ios/Scribe.h \
            -library libscribe-simulator.a \
            -headers ios/Scribe.h \
            -output Scribe.xcframework

      - name: Zip XCFramework
        run: zip -r Scribe.xcframework.zip Scribe.xcframework

      - name: Upload XCFramework
        uses: actions/upload-artifact@v5
        with:
          name: Scribe.xcframework
          path: Scribe.xcframework.zip

  # 发布
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-android-aar, build-ios-xcframework]
    runs-on: ubuntu-latest
    steps:
      - name: Download AAR
        uses: actions/download-artifact@v5
        with:
          name: scribe-release.aar

      - name: Download XCFramework
        uses: actions/download-artifact@v5
        with:
          name: Scribe.xcframework

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            scribe-release.aar
            Scribe.xcframework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
