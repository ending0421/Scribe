name: Build and Test

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust 格式检查和 Clippy
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --lib --bins --tests -- -D warnings

  # 构建和测试
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --lib --verbose

      - name: Run tests
        run: cargo test --lib --verbose
        timeout-minutes: 20

  # Android 构建 AAR (一次性完成，无中间产物)
  build-android-aar:
    name: Build Android AAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26c
          add-to-path: true

      - name: Install cross-compilation targets
        run: |
          rustup target add armv7-linux-androideabi
          rustup target add aarch64-linux-android

      - name: Setup cargo config and environment
        run: |
          NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          TOOLCHAIN=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin

          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [target.armv7-linux-androideabi]
          linker = "$TOOLCHAIN/armv7a-linux-androideabi21-clang"
          ar = "$TOOLCHAIN/llvm-ar"

          [target.aarch64-linux-android]
          linker = "$TOOLCHAIN/aarch64-linux-android21-clang"
          ar = "$TOOLCHAIN/llvm-ar"
          EOF

          echo "CC_armv7_linux_androideabi=$TOOLCHAIN/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "PATH=$TOOLCHAIN:$PATH" >> $GITHUB_ENV

      - name: Build for Android ARMv7
        run: cargo build --release --target armv7-linux-androideabi

      - name: Build for Android ARM64
        run: cargo build --release --target aarch64-linux-android

      - name: Copy libraries to JNI libs
        run: |
          mkdir -p android/src/main/jniLibs/armeabi-v7a
          mkdir -p android/src/main/jniLibs/arm64-v8a
          cp target/armv7-linux-androideabi/release/libscribe.so android/src/main/jniLibs/armeabi-v7a/
          cp target/aarch64-linux-android/release/libscribe.so android/src/main/jniLibs/arm64-v8a/

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build AAR
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload AAR
        uses: actions/upload-artifact@v5
        with:
          name: scribe-release.aar
          path: android/build/outputs/aar/scribe-release.aar

  # iOS 构建 XCFramework (一次性完成，无中间产物)
  build-ios-xcframework:
    name: Build iOS XCFramework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim
          rustup target add x86_64-apple-ios

      - name: Build for iOS device
        run: cargo build --release --target aarch64-apple-ios

      - name: Build for iOS simulator (ARM64)
        run: cargo build --release --target aarch64-apple-ios-sim

      - name: Build for iOS simulator (x86_64)
        run: cargo build --release --target x86_64-apple-ios

      - name: Create fat simulator library
        run: |
          lipo -create \
            target/aarch64-apple-ios-sim/release/libscribe.a \
            target/x86_64-apple-ios/release/libscribe.a \
            -output libscribe-simulator.a

      - name: Create XCFramework
        run: |
          xcodebuild -create-xcframework \
            -library target/aarch64-apple-ios/release/libscribe.a \
            -headers ios/Scribe.h \
            -library libscribe-simulator.a \
            -headers ios/Scribe.h \
            -output Scribe.xcframework

      - name: Zip XCFramework
        run: zip -r Scribe.xcframework.zip Scribe.xcframework

      - name: Upload XCFramework
        uses: actions/upload-artifact@v5
        with:
          name: Scribe.xcframework
          path: Scribe.xcframework.zip

  # 发布
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-android-aar, build-ios-xcframework]
    runs-on: ubuntu-latest
    steps:
      - name: Download AAR
        uses: actions/download-artifact@v5
        with:
          name: scribe-release.aar

      - name: Download XCFramework
        uses: actions/download-artifact@v5
        with:
          name: Scribe.xcframework

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            scribe-release.aar
            Scribe.xcframework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
